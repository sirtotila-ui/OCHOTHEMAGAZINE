<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocho — Portfolio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="navbar">
    <div class="navbar-brand">
      <span class="brand-text">ocho</span>
      <span class="brand-logo">8</span>
    </div>
    <button class="menu-btn" id="menuBtn" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <nav class="menu-overlay" id="menuOverlay" aria-hidden="true">
    <ul class="menu-sections" id="menuSections"></ul>
  </nav>

  <!-- Lightbox: immagine al centro, sfondo blur, nome sezione -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-backdrop"></div>
    <div class="lightbox-content">
      <img class="lightbox-img" id="lightboxImg" src="" alt="">
      <p class="lightbox-section-name" id="lightboxSectionName"></p>
    </div>
  </div>

  <main class="mosaic-wrapper" id="mosaicWrapper"></main>

  <script src="script.js"></script>
</body>
</html>
